name: IRLStreamKitDemo
options:
  bundleIdPrefix: com.uxirl
  deploymentTarget:
    iOS: "17.0"
settings:
  DEVELOPMENT_TEAM: 2H3TG89HPF
  SWIFT_VERSION: "5.0"
packages:
  IRLStreamKit:
    path: ..
targets:
  IRLStreamKitDemo:
    type: application
    platform: iOS
    sources:
      - IRLStreamKitDemo
    dependencies:
      - package: IRLStreamKit
        product: IRLStreamKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.uxirl.streamkitdemo
        GENERATE_INFOPLIST_FILE: YES
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.1.0
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_NSCameraUsageDescription: "The demo captures video from the camera to test live streaming."
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "The demo captures microphone audio to test live streaming."
