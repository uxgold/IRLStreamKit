name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build & unit-test (iOS Simulator)
    # macOS 26 image: the package needs the iOS 26 SDK, and a dependency
    # (eerimoq/DataChannel) declares swift-tools-version 6.2, so Xcode 16.x /
    # Swift 6.1 runners (macos-15) cannot even resolve the graph.
    runs-on: macos-26
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4

      # Select the newest Xcode present on the image (Xcode 26 on macos-26).
      - name: Select Xcode
        run: |
          sudo xcode-select -s "$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)"
          xcodebuild -version

      # Resolves the remote IRLTP binaryTarget and verifies its checksum. This is
      # the guard for "a clean clone can't build" — the exact bug 0.1.0 fixed.
      - name: Resolve dependencies (verifies remote xcframework checksum)
        run: xcodebuild -resolvePackageDependencies -scheme IRLStreamKit

      - name: Build (generic iOS Simulator)
        run: |
          set -o pipefail
          xcodebuild build \
            -scheme IRLStreamKit \
            -destination 'generic/platform=iOS Simulator' \
            -skipPackagePluginValidation \
            | xcbeautify

      # Pick any available iPhone simulator by UDID so this doesn't break when the
      # runner's Xcode changes which devices it ships. Tests run via the
      # IRLStreamKit-Package scheme (the library-product scheme has no test action).
      # Live IRLTP tests are gated on IRLTP_LIVE=1 (hardware/network) and stay skipped.
      - name: Unit tests
        run: |
          set -o pipefail
          UDID=$(xcrun simctl list devices available -j \
            | python3 -c "import json,sys; d=json.load(sys.stdin); ids=[dev['udid'] for rt,devs in d['devices'].items() if 'iOS' in rt for dev in devs if dev.get('isAvailable') and 'iPhone' in dev['name']]; print(ids[-1] if ids else '')")
          echo "Using simulator: $UDID"
          test -n "$UDID" || { echo 'No iPhone simulator available'; exit 1; }
          xcodebuild test \
            -scheme IRLStreamKit-Package \
            -destination "id=$UDID" \
            | xcbeautify
